<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>豊中市立 第十七中学校 ｜ 英語</title>
<style>
  :root{
    --bg:#E7EEE3; --card:#FCFEFB; --ink:#243027; --sub:#5E6B60;
    --line:#D5DECF; --brand:#3F7D5A; --brand-d:#2F6346; --deep:#21452F;
    --cream:#F4F8EF; --gold:#E2B23C;
    --shadow:0 4px 16px rgba(36,48,39,.10), 0 1px 3px rgba(36,48,39,.05);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{
    font-family:"UDデジタル教科書体 NK-R","UD Digi Kyokasho NK-R",
      -apple-system,"Hiragino Sans","Yu Gothic",sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.5;
    display:flex; flex-direction:column; align-items:center; padding:18px;
  }
  .wrap{width:100%; max-width:640px}

  /* ===== HERO ===== */
  .hero{
    position:relative; overflow:hidden; border-radius:26px;
    background:linear-gradient(155deg,#3A6E4C 0%,#2A5638 55%,#21452F 100%);
    color:var(--cream); padding:40px 30px 34px; box-shadow:var(--shadow);
  }
  .hero .watermark{
    position:absolute; right:-26px; bottom:-46px; font-size:15rem; font-weight:900;
    line-height:1; color:rgba(255,255,255,.07); letter-spacing:-.04em; pointer-events:none;
  }
  .crest{
    display:flex; align-items:center; gap:14px; margin-bottom:22px;
  }
  .crest .badge{
    width:64px; height:64px; flex:0 0 auto; border-radius:50%;
    background:var(--cream); color:var(--deep);
    display:flex; align-items:center; justify-content:center;
    font-weight:900; font-size:1.7rem; letter-spacing:-.04em;
    box-shadow:0 0 0 4px rgba(226,178,60,.45);
  }
  .crest .pref{font-size:.86rem; opacity:.85; letter-spacing:.18em; margin-bottom:2px}
  .crest .eng{font-size:.8rem; opacity:.7; letter-spacing:.32em}
  .schoolname{
    font-size:clamp(2.1rem,9vw,3.2rem); font-weight:900; letter-spacing:.02em;
    line-height:1.1; margin:0 0 4px; position:relative;
  }
  .dept{
    display:inline-block; font-size:.82rem; letter-spacing:.28em; font-weight:700;
    color:var(--deep); background:var(--gold); padding:4px 14px; border-radius:99px;
    margin-bottom:24px;
  }
  .message{position:relative}
  .message .lead{
    font-size:clamp(1.35rem,5.6vw,1.85rem); font-weight:800; line-height:1.4; margin:0 0 10px;
  }
  .message .lead .hl{color:var(--gold)}
  .message .desc{font-size:.95rem; opacity:.9; margin:0; line-height:1.7}

  /* ===== MENU ===== */
  .secttl{
    display:flex; align-items:center; gap:12px; margin:30px 4px 14px;
    font-weight:800; font-size:1.05rem; color:var(--brand-d);
  }
  .secttl::after{content:""; flex:1; height:2px; background:var(--line); border-radius:2px}
  .menu{display:flex; flex-direction:column; gap:15px}
  a.card{
    display:flex; align-items:center; gap:16px; text-decoration:none;
    background:var(--card); border:1px solid var(--line); border-radius:20px;
    box-shadow:var(--shadow); padding:22px 24px; color:var(--ink);
    transition:transform .06s, box-shadow .15s;
  }
  a.card:active{transform:scale(.99)}
  a.card:hover{box-shadow:0 8px 22px rgba(36,48,39,.14)}
  .icon{flex:0 0 auto; width:56px; height:56px; border-radius:16px;
    background:#E7F0E9; color:var(--brand-d); display:flex; align-items:center;
    justify-content:center; font-size:1.6rem; font-weight:900}
  .txt{flex:1}
  .txt .t{font-size:1.16rem; font-weight:800; margin-bottom:3px}
  .txt .d{font-size:.85rem; color:var(--sub)}
  .arrow{flex:0 0 auto; color:var(--brand); font-size:1.4rem; font-weight:800}

  footer{margin:30px 0 6px; text-align:center; color:var(--sub); font-size:.82rem; line-height:1.8}
  footer .motto{color:var(--brand-d); font-weight:700; font-size:.92rem}
</style>
</head>
<body>
<div class="wrap">

  <!-- HERO -->
  <header class="hero">
    <div class="watermark">17</div>
    <div class="crest">
      <div class="badge">17</div>
      <div>
        <div class="pref">豊中市立</div>
        <div class="eng">TOYONAKA 17th J.H.S.</div>
      </div>
    </div>

    <h1 class="schoolname">第十七中学校</h1>
    <span class="dept">英語科　ENGLISH</span>

    <div class="message">
      <p class="lead">行動するから、<span class="hl">やる気</span>がわく。</p>
      <p class="desc">ひとタップずつ、今日の小さな一歩を。<br>その積み重ねが、すらすら話せる英語力になる。</p>
    </div>
  </header>

  <!-- MENU -->
  <div class="secttl">学習メニュー</div>
  <div class="menu">
    <a class="card" href="index2.html">
      <span class="icon">A</span>
      <span class="txt">
        <span class="t">がんばれ英単語検定</span>
        <span class="d">単語をくり返し覚えて、土台をつくる</span>
      </span>
      <span class="arrow">→</span>
    </a>

    <a class="card" href="index3.html">
      <span class="icon">G</span>
      <span class="txt">
        <span class="t">すらすら解ける文法力をめざして</span>
        <span class="d">二択で文法をたしかめ、自信をつける</span>
      </span>
      <span class="arrow">→</span>
    </a>
  </div>

  <footer>
    <div class="motto">やる気に満ちあふれた生徒へ</div>
    豊中市立 第十七中学校　英語科
  </footer>

</div>
</body>
</html>
