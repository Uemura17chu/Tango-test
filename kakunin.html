parts.forEach(p=>{const b=document.createElement("button");b.className="tab"+(p==="すべて"?" on":"");b.textContent=p;b.onclick=()=>{cur=p;[...tabs.children].forEach(x=>x.classList.remove("on"));b.classList.add("on");render();};tabs.appendChild(b);});
document.getElementById("q").addEventListener("input",e=>{kw=e.target.value.trim().toLowerCase();render();});
function esc(s){return s.replace(/[<>&]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;"}[c]));}
function render(){
 const list=document.getElementById("list");list.innerHTML="";
 let n=0;
 DATA.forEach((it,i)=>{
  if(cur!=="すべて"&&it.part!==cur)return;
  if(kw){const hay=(it.q+" "+it.ans+" "+it.opts.join(" ")).toLowerCase();if(!hay.includes(kw))return;}
  n++;
  const d=document.createElement("div");d.className="item";
  let body='<span class="num">#'+(i+1)+'</span> <span class="tag">'+esc(it.part)+'</span>';
  body+='<div class="q">'+esc(it.q).replace(/\(\s*\)/g,"（　）")+'</div>';
  if(it.kind==="スペリング"){body+='<div class="ans">答え: '+esc(it.ans)+'</div>';}
  else{it.opts.filter(o=>o!=="").forEach(o=>{const ok=o===it.ans;body+='<div class="opt'+(ok?' ok':'')+'">'+(ok?'✓ ':'')+esc(o)+'</div>';});}
  if(it.exp)body+='<div class="exp">'+esc(it.exp)+'</div>';
  d.innerHTML=body;list.appendChild(d);
 });
 document.getElementById("count").textContent="表示 "+n+" 問";
}
render();
</script></body></html>
